front:
  text: 金剛般若經註序大常博士河南褚亮撰若夫大塊均形智從物情因習改性與慮遷然則達鑒窮覽晈乎先覺炳慧炬以出重昏拔愛河而升彼岸與夫輪轉萬劫蓋染六塵流遁以徇無涯踳馳而趍捷徑不同日而言也頴川庾初孫早弘篤信以為般若所明歸於正道顯大乘之名相標不住之宗極出乎心慮之表絕於言像之外是以結髮受持多歷年所雖妙音演說成誦不虧而靈源䆳湛或有未悟嗟迷方之弗遠睠砥途而大息屬有慧淨法師博通奧義辯同炙輠理究連環庾生入室研幾伏膺善誘乘此誓願仍求註述法師懸鏡忘疲衢蹲自滿上憑神應之道傍盡心機之用敷暢微言宣揚至理曩日舊疑渙焉氷釋今茲妙義朗若霞開為像法之梁棟變羣生之耳目辭峯秀上映鷲岳而相高言泉激壯赴龍宮而競遠且夫釋教西興道源東注世閱賢智才兼優洽精該睿旨罕見其人今則沙門重闡藉甚當世想此玄宗為稱首歲惟閹茂始創懷袖月躔仲呂爰茲絕筆緇俗攸仰軒蓋成陰扣鐘隨其小大鳴劒發其光彩一時學侶專門受業同涉波瀾遞相傳授方且顧蔑林遠俯視安生獨步高衢對揚正法遼東真本望懸金而不刊指南所寄藏羣玉而無朽豈不盛哉豈不盛哉
