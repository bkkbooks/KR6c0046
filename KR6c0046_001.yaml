body:
  text: 紀國寺釋慧淨注如是信辭也信則所言之理順順則師資之道成辭無繁約非信不傳故建言如是我聞證聞也親承曰我聞傳受曰所聞此曰我聞則親承音旨也一時化辰也即法王啓運之日大衆嘉會之時佛化主也大師之名以覺為義一自覺二覺他三覺滿異凡夫故自覺異二乘故覺他異菩薩故覺滿三者備矣受佛名焉在舍衛國祇樹給孤獨園化處也國是遊歷之境園是依止之所住國為化在俗之徒住園為統出家之衆舍衛此云聞物國勝物多出此土嘉名遠振諸國故曰聞物國也祇陀是太子之名此云戰勝太子載誕之時王破敵軍之賊官人聞奏遂以名給孤獨是國臣之號本名須達須達內慈而外富賑貧恤寡鄉人美之因以號焉園是須達所買樹是祇陀之施樹為別物園即總名君上而臣下不可直稱獨園園總而樹別不可但言祇樹故兼之也買園施樹事在別也與大比丘衆千二百五十人俱同聞也比丘有三義一曰怖魔二曰乞士三曰破惡怖魔在初乞士居次破惡最後夫創軌玄門即達降魔之志故剃髮染衣天宮動而魔怖也身為道器身安即道隆故已沾法服須乞食以資身也聖人道長凡夫道消故所修已滿即破惡以證果也爾時世尊上明通序以證信下明別序以發起世尊化主也成實論云具上九號故曰世尊食時化辰也旭旦即始營未畢晚日則飯食復終莫若辰午之間正是初成之際此辰行乞故曰食時也著衣持鉢化儀也外道或不著衣或以手捧食為破裸形外道故所以著衣為破手捧外道故所以持鉢被僧伽梨衣故曰著衣執四天王所奉之鉢故云持鉢入舍衛大城化處也此城家九億縱橫十二由旬故言大也園南而城北自外以適內故言入乞食化事也由從之而乞食則成彼之福田故也於其城中次第乞已化等也夫捨富從貧即益貧不益富捨貧從富即益富不益貧捨富從貧故大迦葉所以被呵捨貧從富故須菩提所以置鉢今佛不爾故云次第乞也還至本處知足也由知足故乞不過量由樂靜故還歸本所也飯食訖化終也金剛之體豈資於食為益物故現同飯也收衣鉢上敘行塗乞食下明敷坐入靜欲令衆生生福故所以行塗而前乞欲令衆生生智故所以入靜而後説收衣鉢者屏外緣也制僧伽梨衣為入聚落受四天王鉢為貯資糧還至本處故衣須收飯食事訖故鉢須置也洗足已行塗所以穢足敬定所以清身敷坐而坐正入靜也將欲説法故敷師子之坐即事入定宜結跏趺之坐也時長老須菩提上明序分言興致之由下明經體彰即坐之益長老尊稱也須菩提此云善吉亦曰空生生時其室盡空故曰空生父母問師師云唯善唯吉故言善吉在大衆中即從坐起但尊人重法理自不可端拱況即事請道所以側身避席偏袒右肩既表師資之儀示有驅策之相亦是隨從國法即以右袒為恭右膝著地屈曲伏從示無違拒之貌合掌恭敬斂容祗肅顯有專一之心而白佛言希有世尊既欲請道宜先歎德歎德之意即為請益之基希有世尊之言命章總歎之謂也如來如目真如來目無分別智如以不異為義來以至處為功三世諸佛皆以無分別智乘真如之道來成正覺故曰如來也善護念諸菩薩善付屬諸菩薩菩薩者此云道心衆生護念約轉法輪時化深行菩薩付屬約般涅槃時化淺行菩薩護念者護是防其自身與智慧力令成就佛法念即緣其所化弟子與教化力令成就衆生化力有三一神通輪二記心輪三正教輪神通轉變故能使背邪以歸正記心言實故能使除疑以生信正教示理故能使捨惡以修善付屬者付是將淺以授深屬即教深以化淺淺行菩薩於功德有二種一已得二未得已得者欲令不捨未得者欲使增修故將淺以付深屬深化令不退也世尊善男子善女人言善者為異闡提外道之流男女者即簡二根閽閹之類發阿耨多羅三藐三菩提心阿名無耨多羅名上三名正藐名遍後三名知菩提名覺總曰無上正遍知覺正是如理智遍是如量智知是無分別智覺是無分別後智如理智緣真故言正如量智緣俗故言遍無分別智斷二種無知故言知無分別後智出眠夢之表故言覺此四智即佛果之正體人若發心遠求此體名曰發菩提心此立為問之本應云何住云何降伏其心夫法門雖曠不出大乘之與小乘因德之與果德此經顯大乘法門明菩薩正行所以請因而不請果由因成必得果故亦舉果以明因耳大乘明因有三一應得因二加行因三圓滿因所應得者謂菩提心所可行者謂十度行所須滿者謂三德果發心因乎佛性起行因乎發心圓果因乎加行故以佛性為應得之因發心為加行之因加行為圓滿之因此文應具三問初問云云何住此請加行因言欲發菩提心住何心而成發次問云何修行此請圓滿因言欲修菩薩行起何行而成修後問云何降伏其心此重請圓滿因言欲滅正行障降何心而成滅然因既有三但請後二何也夫初因本有本有者非佛事後二新生新生者是佛事非佛事者有説亦有無説亦有由此義故不待問而自成是佛事者有説則有無説則無由此義故必因請而方立也佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付屬諸菩薩讚而後述重其言也汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心誡而後許專其意也唯然世尊願樂欲聞長老蒙許言志愍也佛告須菩提諸菩薩摩訶薩應如是降伏其心摩訶言大大菩薩也先答第一問而言降伏者只令住四恩德而發心即降伏凡夫二乘心也四恩者一廣心二第一心三常心四無倒心前二明度而能周即以廣降狹後二明度無所度即以無降有以廣降狹是伏二乘心以無降有是伏凡夫心伏凡夫心顯有智慧也伏二乘心明有慈悲也此先總教下即別敘所有一切衆生之類此明廣恩也衆生之類今略舉三將列別類先總別敘發之也若卵生若胎生若濕生若化生此列生類生者新諸根起也依㲉而生曰卵含藏而出曰胎假潤而興曰濕欻然而現曰化也若有色若無色此列界類界者差別義也一欲界二色界三無色界欲界必兼有色色界其必無欲無色一界無色無欲言若有色即攝下二界衆生也言若無色即攝上一界衆生也若有想若無想若非有想非無想此列性類性者體義也一切衆生以想為性一有想謂有心而粗二無想謂無心而寂三非有想非無想謂雖有心非粗非寂非粗故異乎有想非寂故異乎無想故曰非有想等言若有想即攝七有想定及欲界衆生也言若無想即攝二無想定及無想天衆生也言若非有想非無想即攝非想非非想天衆生也此並是廣心之境欲求無上道應先住之而發心也我皆令入無餘涅槃而滅度之此明第一恩也前雖廣度若與人天之樂名曰下恩若與二乘之樂名曰中恩若與大涅槃樂名曰上恩涅槃以真如為其體以靜息為之義靜即靜三惑因息即息三苦報靜惑因故建有餘之名息苦報故立無餘之目我皆令入能施恩心也無餘涅槃所施恩體也而滅度之施恩正事也如是滅度無量無數無邊衆生實無衆生得滅度者此明常恩也菩薩所以能常化者由悲智兼修也若有悲而無智即滯有以生疲若有智而無悲即著空以取證若帶悲而行智即緣空而不取若帶智而行悲即化恆而不息如是滅度無量衆生此明化俗有悲實無衆生得滅度此顯緣真有智緣真有智故物我一體化俗有悲故恆行不息何以故下明無倒恩也疑曰前言滅度衆生後言無生得滅度何謂也須菩提若菩薩有我相人相衆生相壽者相即非菩薩我等四執是分別之心分別之心是菩薩正障有我等相自惑未亡也即非菩薩有倒何能化物翻此義者無我等相即自惑已盡乃名菩薩無倒故能常化也復次須菩提菩薩於法應無所住行於布施自下次答修行問行即布施今教布施令離三障一不行障二僻行障三倒行障不著自身離不行障不著報恩離僻行障不著果報離倒行障夫著自身者愛己而惡人有吝而無施無施即不行不行障行也今本闕此別本曰不住於事而行布施事即自身也於法應無所住者此離僻行障法者恩境也謂供養恭敬之流稱名揚德之類事緒繁曠故以法語總之也若施求此報名曰僻行僻者一僻因不以悲智為方便二僻果不以大覺為所求也所謂不住色布施不住聲香味觸法布施此離倒行障正報是受體在法塵依報是受資即五塵生死之受無樂而計樂是名倒為生樂受求樂受資名倒行不令住五塵即捨依報不令住法塵即捨正報但令為無上菩提而行布施即菩薩正行也但言布施亦具三檀攝六度三檀者一資生檀攝布施一度即體名也二無畏檀攝戒忍兩度衆生於我或已作惡或未作惡未作者而不犯戒施無畏也已作者而不報忍施無畏也三法檀攝精進禪定智慧三度精進故誨而不倦禪定故言必逗機智慧故所説無倒若能如是布施即離三障行三檀攝六度具菩薩三行一離障行二正行三圓滿行菩薩住大乘中應如是修行也須菩提菩薩如是布施不住於相自下次答降伏問相為所住心為能住相謂三輪體一施者相二受者相三財物相也心謂三輪想即施者想受者想財物想相是分別性即相結想是依他性即粗重結此二是菩薩正障若菩薩作無性觀分別本來無相故相結滅依他本來無生故粗重滅若能於六度之中行一一度並離三相及三想即是降伏執相之心成就無相之行何以故疑曰住相何損捨相何益而令捨相不令住邪若菩薩不住相布施其福德不可思量答明福難量也何者無相是真有相是俗真理即通俗事即隔無相之心契真理而無際所生功德豈俗事之可量也須菩提於意云何東方虗空可思量不更顯難量義空有三德故不可量一性常二體一三容受今問東方空體論其遠近可度量不也不也世尊向東無際不可量也須菩提南西北方四維上下虗空可思量不次問九方不也世尊所向無際悉不可量夫虗空之體是一約色以辨十方欲顯無相之心是一寄行以階十位容受東方色即説東方空攝受初地行即為初地體餘方餘地亦如是須菩提菩薩無住相布施福德亦復如是不可思量明喻既畢此即合之須菩提菩薩但應如所教住夫著相行施是有住之住忘相行施是無住之住今勸捨有住之住住無住之住故云如所教住也須菩提於意云何可以身相見如來不前來依問正答自下因答斷疑正答即標宗略説斷疑即開宗廣説然體有三一正教經二正行經三正果經教是章句行是六度果是三身今先約正行斷疑疑曰若住相行因可感有相之報忘相行因應得無相之果云何世尊本行忘相之因今得有相之果果既有相則因非無住明矣佛欲斷此疑故為斷問身相即三十二相可以妄中之身相見真中之妙體不不也世尊不可以身相得見如來須菩提承刀奉答身相是妄如來是真不可依妄以觀真體也何以故如來所説身相即非身相曉不也意身相即非身相略有三義一由聚二由相三由性由聚者身相以鄰虗為體九微十微為聚約方分以扸之度鄰虗而必盡也由相者者身相以有為為體生等八法為相約前後以推之極剎那而自壞也由性者身相以境界為體以分別性為性約無相以觀之入唯識而成空也由此三義不可以相觀如來也佛告須菩提凡所有相皆是虗妄若見諸相非相則見如來須菩提答稱佛心佛更成其義也凡所有相則凡有生等之八相皆是虗妄不越聚等之三體若見諸相非相遣妄以入真則見如來證真以離妄若然者忘相行因是依真如所得之果何關有相不可見方便之相以相為真即以果謗因疑因為住也須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不自下次約正教斷疑疑曰前説不住之因深而難行後説無相之果深而難得未來世頗有得聞是經信行無住之因必得無相之果不也佛告須菩提莫作是説將立有以答之先呵無以止問故言莫作是説也如來滅後後五百歲夫法身則無始無終應身則有始無終化身則有始有終王宮初生為始雙樹入滅為終故曰如來滅也如來滅後初五百年解脫得堅固次五百年禪定得堅固後五百年多聞得堅固此時雖多不信然有信受之者有持戒修福者持戒者多是出家菩薩修福者多是在家菩薩智度論云出家之人以尸羅為上首在家菩薩以檀那為上首於此章句章言大分前説不住之深因此為一章後説無相之深果復為一章句言委細不住因中不住色等之流無相果中相即非相之類也能生信心以此為實信行無住之因必得無相之果故言以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根善根有三一無貧二無瞋三無癡由此善根於佛田中燒香散華稱名揚德故言種也不於一佛者樹因不淺也已於無量者植福久深也聞是章句乃至一念生淨信者欲顯信雖少而福多故云乃至一念也須菩提如來悉知悉見是諸衆生肉眼是見而非知比智是知而非見證智是見亦是知言知明非肉眼之所見言見明非比智之所知即是證智知其名身見其色行故雙言也得如是無量福德得有二義一生二長本無今有曰生已有熏修曰長福德通論有三一有量有盡謂凡夫所修福因心偏故有量果有為故有盡二有量無盡謂二乘所修福因不遍故有量果無為故無盡三無量無盡謂菩薩所修福因心遍故無量果無為故無盡信經所得之福即是第三故言無量也何以故欲曉無量意故發問以徵之也是諸衆生無復我相人相衆生相壽者相下答意明一由達人法二空二由成取捨兩行所以生一念信心得無量福德此明達於人空離人我四執也夫我是自在之名人為主宰之目衆生取續前為義壽者以接後為能此四同為人執隨用以立四名離此四執故曰無我等相也無法相亦無非法相別本曰無相無無相此明達於法空離法我四執夫法相者是有法執迷俗諦起俗諦法相不出所取之境能取之心分別無相故無所取之境依他無生故無能取之心故云無法相也非法相者是無法執迷真諦起若真如約俗諦不可説為有法相真如約真諦應可説為無法相今明待俗有故言真無有既壞故無亦遣故云無非法相也相者是亦有亦無執迷非安立諦起何者初破俗有言非有非有似是無後破真無言非無非無似是有若爾真如應亦有相亦無相今明真如之體異根塵之有故不可安立為有相異兔角之無故不可安立為無相故云無相也無相者是非有非無執迷言説起若真如非有相非無相即應心行處滅言語道斷若爾如來何所説今明真如雖不可説由佛方便故或説為有相或説為無相故云無無相也總而言之真如非有故增益滅非無故損減滅非亦有亦無故相違滅非非有非無故戲論滅何以故欲曉障盡意故發問以徵之也是諸衆生若心取相則為著我人衆生壽者答意明法我執為因人我執為果人執即斷故不生法執即伏而不起故論曰但有無明便無現行粗煩惱若心取相即法執上心則為著我人執起也此先總答下別敘之若取法相即著我人衆生壽者此明有法執上心即人執還生也何以故若取非法相即著我人衆生壽者此明無法執上心即人執還生也是故不應取法不應取非法次結成取捨兩行不應取法不令執文以取義即令捨文也此示正聞相不應取非法當令順文以取意不可一向撥文為非法復令取文也此是實信相以是義故如來常説汝等比丘知我説法如筏喻者法尚應捨何況非法引喻顯之筏者為度故須取到岸故須捨修道亦爾憑筌乎會理故須取得理乎忘筌故須捨執文為法是善心而尚捨之若執文為非法是不善心固須捨之也須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶自下次約正果斷疑疑曰前説不可以相見如來則如來是無相無相之中無動無作云何世尊就草座而成道指拘鄰而説法佛欲斷此疑故為斯問須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説下答意明佛有三身法身應身化身法身以如為體應身以智為體化身以色為體無覺無説言法身有覺無説言應身有説無覺言化身須菩提言如來定以真如為體真如非法非非法故云如我解佛所説義然菩提為所得及所説如來為能得及能説菩提非法非非法故無所得及所説如來非法非非法故無能得及能説故云無有定法名菩提亦無定法如來可説也何以故欲證無説意故發問以徵之也如來所説法皆不可取不可説非法非非法答意明化身雖説然所説之義甚深過聞慧境聽者不可以耳識作有無二相取故云不可取所顯之理徵細過思慧境説者不可以舌根作有無二相説故云不可説離有性故非法離無性故非非法維摩經曰其説法者無説無示其聽法者無聞無得即其義也若化身能説者何故論云應化非真佛亦非説法者耶既云化佛非真佛亦是化説非真説且復説無定相故云非説非無化佛不定相説也所以者何一切賢聖皆以無為法而有差別欲顯所説非法非非法故舉所證以明之夫覺無為最淺者名須陀洹覺無為最深者名為佛此其差別也能覺者應身耳由應身如是覺故化身如是説所覺既非法非非法故所説亦非法非非法也所以通説一切賢聖者欲顯一切聖人同證無為為體也須菩提於意云何若人滿三千世界七寶以用布施是人所得福德寧為多不自下次顯斷疑功用夫於經有疑即懷謗以生罪於經無疑即信受而生福欲顯所説之法雖不可取不可説然受説能詮之教即生福無邊故為斯問一須彌一日月一四天下為一小世界即以小世界為本其數至千名小千世界即以小千為本其數至千名中千世界即以中千為本其數至千名大千世界總計有百億須彌百億日月百億四天下成即同成壞即同壞下極風輪上窮有頂一佛所主之處名曰三千大千世界今問若人施寶同乎此量所生之福得為多不須菩提言甚多世尊珍寶之量既弘生福之理彌積故云甚多何以故欲明此福雖多而未勝故先發問以徵之何故此福得名多也是福德即非福德性答意明福有二種一有流二無流多有二義一聚義二進義聚謂聚集福體進謂進趣菩提是福德者是有流之福德即非福德者非無流之福德是有流之福故有聚義之多也非無流之福故無進義之多也無進義之多者豈空無果乎得有流報故無有無果之理報盡即絶故無有進趣之義是故如來説福德多須菩提離自師心更引如來為證也若復有人於此經中受持乃至四句偈等為他人説其福勝彼受持四句受他法施也為他人説以法施他也受他法施明生自聞慧以法施他明生他聞慧若人自能住聞慧福已勝彼何況自住思修兩慧也若人令他住聞慧福已勝彼何況令他住思修兩慧也何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出菩提即法身諸佛即應化兩身菩提名出謂顯性以離纏諸佛名出謂生成以得體此經既出諸佛之三身故顯受説之二勝也須菩提所謂佛法者即非佛法佛是學者之名法是菩提之目菩提體唯佛之所能覺故名佛法餘人之所不覺故云即非佛法所謂佛法者謂是大乘之佛法即非佛法者非是二乘之佛法非二乘之佛法此顯不共義是大乘之佛法此顯最勝義受説此經能出不共之佛法故成最勝之深因也須菩提於意云何須陀洹能作是念我得須陀洹果不前約如來法身斷疑自下次約弟子法身斷疑疑曰前説一切聖人以無為而有差別後言無為之法不可取不可説此猶難信何者現見四果聖人能取無為以為自果如其所取能為人説云何言不可取不可説佛欲斷此疑故為斯問此問第一果也言須陀洹人正證無為之時能作是念我得果耶為不得耶須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須陀洹此云入流亦曰逆流流有二種一生死流二聖道流是名入流明入聖道之流而無所入顯逆生死之流在觀既無復分別豈見道流可入乎既不見道流之可入豈見道果之可得乎既不見道果之可得豈見可得之可見乎須菩提於意云何斯陀含能作是念我得斯陀含果不此問第二果也須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含斯陀含此云一往來此人證果之後若人中命終即往天而來人若天中命終即往人而來天由一往一來便得滅度故曰一往來觀內既不見有我誰往誰來故云實無往來也須菩提於意云何阿那含能作是念我得阿那含果不此問第三果也須菩提言不也世尊何以故阿那含名為不來而實無來是故名阿那含阿那含此云不來此人證果之後生上而不生下有去而無有來故曰不來觀內既不見有我説誰不來故云而實無來也須菩提於意云何阿羅漢能作是念我得阿羅漢道不此問第四果也須菩提言不也世尊何以故實無有法名阿羅漢阿羅漢此云不生此人證果之後永絶三毒之根高謝四生纍故曰不生觀內既不見有我説誰不生故云實無有法名阿羅漢也世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者有念既四執生無念即四執滅四執滅者可以有滅之實而實之四執生者豈以不生之名而名之哉世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢三昧此云定無諍定者遠分定也得此定者能令彼我不起煩惱之諍故曰此定為無諍也無諍第一即定障之諍滅離欲第一即惑障之諍盡我不作是念我是離欲阿羅漢須菩提言我身自證不起自得之心餘人若成豈生擭果之念世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者阿蘭那此云無諍須菩提言我若有念則此記無由也以須菩提實無所行而名須菩提是樂阿蘭那行實無所行兩諍之體離乎心也而名樂行無諍之名記乎身也佛告須菩提於意云何如來昔在然燈佛所於法有所得不前約聲聞法身斷疑今約菩薩法身斷疑疑曰菩薩即真如真如之中無取無説者然燈如來云何為説菩薩之法釋迦菩薩何故親從受之耶佛欲斷此疑故為斯問汝意云何我昔入觀之時然燈於我有説耶我於然燈有得耶為無所説耶為無所得邪世尊如來在然燈佛所於法實無所得法是菩提得即證也答意明法中則心行處滅覺觀之所不尋言語道斷名筌之所不逮名筌不逮故昔佛所以杜言覺觀不尋故今佛所以絶證但言釋迦絶證則然燈杜言從可知也須菩提於意云何菩薩莊嚴佛土不前斷得記疑今斷嚴土疑得記即仰上以受化嚴土是俯下以利生疑曰若身是無相之身即土應無相土土若無相不應取有纍之事像修萬行以嚴之土若有相復何異控龍象於兔蹊注江湖於牛迹佛欲斷此疑故為斯問汝謂菩薩真觀之中有嚴事耶無嚴事耶不也世尊何以故莊嚴佛土者則非莊嚴是名莊嚴答明無也莊嚴有二種一形相二真實形相色性為其體衆寶為其相真實者法性為其體萬德為其相形相以依化為能嚴分別為所嚴分別無相故無所嚴之體依化無生故無能嚴之體故云即非莊嚴也真實以唯識為能嚴法性為所嚴唯識無倒故有能嚴之體法性不變故有所嚴之體故曰是名莊嚴也若然者豈取有纍之事像修形相之嚴哉是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心此勸取真實之嚴令捨形相之障也
