body:
  text: 須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不斷行障已次斷情疑疑曰若今時菩薩是無昔日亦應是無若昔日菩薩是有今日亦應是有昔若無者釋迦菩薩不應依然燈以得道昔若有者今時發心何得獨云無邪佛欲斷此疑故為斯問也不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提須菩提玄悟聖旨故答以無得也佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提先述如是美其言也須菩提若有法如來得阿耨多羅三藐三菩提然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼次舉得記成其義也夫授之為體示果也記之為義定時也然燈正覺既遙授以當來則釋迦菩薩豈即成於昔日故論曰以後時授記然燈行非上以後時授記授記後時方得也然燈行非上昔行不得菩提也解者或云三時授記何其謬歟也何以故如來者即諸法如義疑曰前舉然燈明菩提不可取今舉然燈明菩薩不可得若爾本以菩薩得菩提故曰如來若無菩薩得菩提則一向將無如來邪今明諸法之如以不異為義如來之如亦爾未證之前曰法如已證之後曰如來名雖二矣體猶一焉諸法之如目法如來之如目人法如既實有則人如不無也人如不無矣則如來實有也若有人言如來得阿耨多羅三藐三菩提疑曰前無菩薩故可使菩薩不得菩提今有如來故則如來自證菩提邪佛欲斷此執故標而出之也須菩提實無有法佛得阿耨多羅三藐三菩提夫前執菩薩得菩提彼為不實今謂如來得菩提此亦為虗故言實無有法佛得菩提也前無菩薩故言有得者應非實今有如來故言有得者應非虗夫菩提者以真如為其體真如者妙有妙無非因非果出心慮之表絶言像之外難以覺觀求難以身心得而彼謂如來得之於色心求之以覺觀此其非妄誰其妄乎故維摩經曰菩提者不可以身得不可以心得寂滅是菩提滅諸相故不觀是菩提離諸緣故須菩提如來所得阿耨多羅三藐三菩提前明如來無所得或謂如來一向不得菩提為斷此謗故言如來所得菩提也於是中無實無虗疑曰前言有得者非實今言有得者非虗何謂也今斷此疑由有相之中無可得説有得者無實由無相之中有可得説有得者無虗無實即遣有相之中有謗無虗即遣無相之中無謗也是故如來説一切法皆是佛法夫統諸法者真如證真如者諸佛佛既證其本亦所以統其末也由此言之一切法皆是佛法此更舉其所得示無虗也須菩提所言一切法者即非一切法是故名一切法真如者諸法之通體然其諸法有順真者有違真者順真者真所持違真者真所離真所持者真處有真所離者真處無真處有者是名一切法亦名佛法真處無者是名一切法而非佛法也言即非一切法就離相以為言是名一切法約即真而成義此更舉其不得示無實須菩提譬如人身長大此更寄喻以示體也譬如人身指法身也隱則稱如來藏顯則名法身出二障之表故言長周萬像之內故稱大須菩提言世尊如來説人身長大則為非大身是名大身須菩提既悟聖旨更對妄以明真也何則身有二種一聚身二依身聚身以五陰為體依身以真如為性五陰則分而有限真如則圓而無際分有限者開彼我而為二圓無際者泯自他而為一彼我既開稱曰彼我自他若泯非復自他言則非大身則非自他之聚身是名大身即真如之依體也須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩疑曰證菩提者是自行度衆生者是化他昔無菩薩者是無自行矣今無菩薩者誰復化他耶佛欲斷此執故標而出之何以故須菩提無有法名為菩薩是故佛説一切法無我無人無衆生無壽者我無故無能度衆生無故無所度壽者無故無恆度此三若寂即是人空人既空矣何有菩薩於其間而欲強度衆生哉須菩提若菩薩作是言我當莊嚴佛土是不名菩薩疑曰證菩提者但自行度衆生者但化他能自他兼利者其唯清淨佛土耳若無菩薩者誰復莊嚴佛土欲自他兩利乎佛欲斷此執故標而出之何以故如來説莊嚴佛土者即非莊嚴是名莊嚴上言莊嚴顯所嚴之土可不取今言莊嚴顯能嚴之人不可得所嚴可不取即法空也能嚴不可得即人空也人法俱空者何有菩薩於其間而欲莊嚴佛土乎須菩提若菩薩通達無我法者如來説名真是菩薩執有我者既非菩薩通達無我者理真菩薩也須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼前約菩薩斷疑下約如來斷疑疑曰前説菩薩不見我為能度衆生為所度不見佛土為所淨我為能淨若爾則如來不見諸法耶為斷此疑故興五問明佛有能見之真眼但了所覩之非實夫肉眼以人中淨根為體緣障內色為境天眼以天中淨根為體緣障外色為境慧眼以如理智為體緣真諦為境法眼以如量智為體緣俗諦為境佛眼以無功用智為體緣一切法為境佛在人中生故有肉眼常在三昧故有天眼得不可思議空智故有慧眼隨機説法故有法眼以一念相應慧知一切法故有佛眼須菩提於意云何恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知已出見體次顯見用夫心者語其性則六七八九之流言相應則染淨定散之類條緒繁曠故以若干總之也夫色為照心之門言知心者色亦見也何以故如來説諸心皆為非心是名為心前明見而周盡今明盡而無倒夫住四念處者順緣而心實住五欲塵者翻境而心虗實則得其心名虗則失其心義諸心非心顯離四念之境明非實心也是名為心結住五欲之塵明是倒心也所以者何須菩提過去心不可得未來心不可得現在心不可得前就境以顯倒此即性以明虗何者過去心已滅故不可得未來心未起故不可得現在心不住故不可得無得為得此其虗妄也諸心雖妄佛則體妄而知之故能知之心非倒也須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不前約智斷疑今約福斷疑疑曰若前心是倒此心修福為倒非倒如其是倒不應名善如其非倒何以依倒而生佛欲斷此疑明得福少者是倒得福多者非倒故為斯問也如是世尊此人以是因緣得福甚多須菩提深悟玄旨故答以甚多也須菩提若福德有實如來不説得福德多以福德無故如來説得福德多夫捨寶不殊運心有異若捨心離實念則為生死之因故是倒若捨心住乎實智則為佛慧之本故非倒為佛慧本則畢竟無竭為生死因則終歸有盡佛欲顯此義故曰若福德有實如來不説多此明有實則有漏有漏則有盡有盡則為少以福德無故如來則説多此明無實則無漏無漏則無盡無盡則為多須菩提於意云何佛可以具足色身見不前約應身斷疑今約化身斷疑福智是應身相好是化身疑曰前説如來者即諸法如義真如非色相好是色如來是色也不應真如為名如來非色也不應有相有好佛欲斷此疑故為斯問不也世尊如來不應以色身見須菩提悟化真之有異故答以不應也何以故如來説具足色身即非具足色身是名具足色身曉不應意夫真身體也化身用也色即非色推化以入真是名色身從真以流化體用相依未曾相離不可見化即謗真體不得聞真便疑化用也須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足前明八十種好此明三十二相疑意不殊斷何容異夫法身在出世猶空中之月色身在世間若水中之像水中之像無體而可見推其本體即空中之月世間之色無實而可覩尋其本實即出世法身須菩提汝勿謂如來作是念我當有所説法前約化體斷疑今約化用斷疑相好是化體説法是化用疑曰如來有色可應有説如來無色其誰説乎佛欲斷此執明説法不離法界即如色身不離法身故言勿謂我有所説也莫作是念何以故若人言如來有所説法即為謗佛不能解我所説故所説是無故而謂有此其不解也心執而口言此其謗佛也須菩提説法者無法可説是名説法曉謗意也説無可説推俗以入真是名説法從體以起用所謂從最清淨法界乃至流乎化身化身流出此經也須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶前約化身斷疑今約法身斷疑疑色聲是化身菩提是法身疑曰證果下者有上證果上者無上前説實無有法得菩提無上之名因何立耶須菩提欲斷此疑故為斯問如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提夫諸法本寂則煩惱性空煩惱既空有何可斷空即是滅何須別證此滅即是無上菩提也故經曰一切衆生即寂滅相不復更滅復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提既其無得而名無上者由體平等也體即法界無量衆生成佛此亦不增無量劫中不成佛此亦不減不增故不高不減故不下既無高下矣更有何法踰其表而不名無上乎以無我無人無衆生無壽者復由淨平等也無我無人即清淨義因時自性清淨果時無垢清淨斯淨無等亦無上之稱謂也修一切善法則得阿耨多羅三藐三菩提復由道無等也道即一切善法須菩提所言善法者如來説非善法是名善法善是離惡之名法是能持之義無流之善有二功能一是離障二是持真説非善法就離障而為功是名善法約持真而成義由此言之餘無等也因既無等而果有上者未之有也須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持為他人説於前福德百分不及一百千萬億分乃至算數譬喻所不能及前約法身果斷疑今約法身因斷疑疑曰菩提之因必善則正説之體無記云何以無記之因得菩提之果也為斷斯疑明汝法是無記而我法自是善何者正説即發起善也本從真實生未還顯真實所以一偈法寶勝無量珍寶也法寶勝故持雖少而福多珍寶劣故施雖多而福少也須菩提於意云何汝等勿謂如來作是念我當度衆生前約法身因斷疑今約法身業斷疑法身以一切善法為因以解脫衆生為業疑曰菩提平等無高下者何得以如來為能度衆生為所度能所既異矣何平等之有哉佛欲斷此疑故為斯問莫謂我道自然成故為能度他道由我得故為所度也須菩提莫作是念何以故實無有衆生如來度者如來不離法界所以無能度衆生不離法界所以無所度若有衆生如來度者如來則有我人衆生壽者有度則有執聖與凡同也須菩提如來説有我者則非有我而凡夫之人以為有我無度則無執凡與聖異也須菩提凡夫者如來説則非凡夫不得聖法名曰凡夫凡夫者執我之物耳凡夫無者我亦無也須菩提於意云何可以三十二相觀如來不五眼以來依果斷疑從此以去推因斷疑疑曰前説如來不可以相見應可以相知譬如火體不可以煙見然可以煙知若可以相知應可以福感佛欲斷此執故為斷問汝以同凡之偽相觀異化之真體不也須菩提言如是如是以三十二相觀如來須菩提欲引後難之深旨且依前問而淺答言可以妄內之粗相觀真中之妙體也佛言須菩提若以三十二相觀如來者轉輪聖王則是如來若以相而比真則輪王應是佛若輪王非佛者則覩相不知真須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來須菩提既審輪王之非佛方悟覩相不知真也爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來二乘觀佛約二境成一見相好二聞説法若有相而不能説不異輪轉聖王若能説而無有相不異聲聞弟子夫證真如者無分別智取色聲者即分別之心若以分別之心求真如之體此既僻矣豈見佛乎若爾如來不可以相知即菩提不可以福感亦已斷矣須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相得阿耨多羅三藐三菩提前斷執因以比果今斷謗因而無報疑曰若福德之因不感菩提之報是則為善虗其功斷滅而無果佛欲斷此執故言莫作是念也須菩提汝若作是念發阿耨多羅三藐三菩提者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提者於法不説斷滅相説斷滅者則不成發心成發心者則不説斷滅須菩提若菩薩以滿恆河沙等世界七寶布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德欲顯不滅義故格量以喻之夫有我即有生無我即無生若菩薩證無我理得無生忍者登初地也夫地前之福既資忍以冥空地上之智亦導福以成勝則得無垢果劣則得有漏報果無垢者因雖少而不滅報有漏者行雖多而有盡須菩提以諸菩薩不受福德故前約不滅以明得今約不受以明捨即以不受顯不滅受則終滅也須菩提白佛言世尊云何菩薩不受福德不受是何義也須菩提菩薩所作福德不應貪著是故説不受福德受福因為貪取福報為著不貪因不著果此不受之義也須菩提若有人言如來若去若坐若臥是人不解我所説前破執斷以謗因今破迷常以謗果何則來以顯生去以顯滅坐臥顯老疑曰處世者有生有滅出纏者無去無來若福德之因不受世間之報云何世尊有去來之迹異坐臥之形殊同處世者之威儀為衆生之受用既四儀遞易三相更遷此而名常何其謬也佛欲斷此執故曰是人不解也何以故如來無所從來亦無所去故名如來夫如來者即真如義嶷然不動湛然常住出前際故無生出後際故無滅出中際故無老無生所以無來無滅所以無去無老所以無變既離三相絶四威儀心慮尚所不緣耳目其何能接衆生受用自是化身執化為常誰之謬也須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊前明相離故真身無去無來今顯障盡故化身不一不異故為斯問夫世界作微塵是微塵從世界出此喻示何義示化身從法身生微塵衆甚多是微塵遍於虗空此喻示何義示化身充於法界何以故前是破粗為細下更推有入無欲顯多非實故先發問以徵之若是微塵衆實有者佛則不説是微塵衆夫通論塵體有粗粗極世界細極鄰虗成則積鄰虗以終世界壞則破世界以畢鄰虗以微言塵者顯是鄰虗也以塵言衆者明不獨住也夫塵實則非衆塵衆則非實實則不可破假則可令盡塵塵盡故虗空淨惑障盡故法界淨虗空淨故鄰虗雖滿而難見不可言一所住異所住法界淨故化身雖遍而難知不可言一所住異所住也所以者何佛説微塵衆則非微塵衆是名微塵衆此更證塵假也世師説鄰虗是實是常無有方分毗婆沙師説鄰虗是實無常亦無方分此雖常無常異而為失不殊何者如一時七鄰共聚如其是實一分觸耶具分觸耶若一分觸則中間一鄰向外有六方之分若具分觸則外邊六鄰向內同為一體有六方之分則是假而非實同為一體復不可積少以成高用此而推則鄰虗假也故曰塵衆則非塵衆而名塵衆者但假施設耳世尊如來所説三千大千世界則非世界是名世界夫離能成之塵衆無所成之界體微塵既非實則世界亦假也何以故若世界有實則是一合相實則一合相不合則非實也如來説一合相則非一合相是名一合相合是觸義若合是具分觸則世界量等鄰虗若合是一分觸則世界終無別體故一合亦非一合也而名一合者亦但施設耳須菩提一合相者則是不可説若言一合定有定無或實或聚此為證智之所知非言辭之能説也但凡夫之人貪著其事無言既聖智之所知有言則凡情之妄取須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不夫微塵之與世界是相結人見之與法見是粗重結前明破相結此破粗重結夫人之與法是境人見法見是心境以分別性為體心以依他性為體分別是無依他是虗無則不斷虗則可滅欲顯可滅義故為斯問世尊是人不解如來所説義如來説虗人執為實此不解也何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見曉不解意何者我境若是有約我以起見此見是我見我境若是無約我以起見則此見非我見夫境有則心實境無則心虗實則不可斷虗故可滅也須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相前明滅人見此明滅法見知見信解即其治道也知是世智見是真智信解是定知在方便位比而未證故名知見在正觀位證而不比故名見定通二位為世智所依故名信為真智所依故名解三行若修兩障斷也須菩提所言法相者如來説即非法相是名法相相猶想也夫法與人異想與見同法既類我而是無想亦同見而為妄真則不可斷妄故可滅也須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼前明道修則障斷今明障斷則説益故論曰示現世智第一義智及依止三昧以得遠離彼障是故重説勝福譬雖諸佛化身説法有無量無盡無漏功德此明法施則無量無盡無漏故為勝財施則有量有盡有漏故為劣也云何為人演説更問化説相化佛説法之時為顯化而説為不顯化説顯則聞者識化以生謗不顯則受者信實以生敬謗則有損敬則有益益則為正損則為邪不取於相答明取則顯自相不取是不顯也如如不動智如境如境如智如故曰如如如如湛寂故言不動夫有動則有取不動則不取所以化説之不取由契如如之不動此更轉相明也夫以不動明不取不取明説正亦以説正明説益説益明福大也何以故疑曰涅槃是靜生死是動佛證涅槃可言是靜既行生死云何不動一切有為法如夢幻泡影如露亦如電應作如是觀答意明行而住者則動行而不住則不動為顯此義故説偈喻喻應有九此偈闕三分別本及論並具之也此九即喻九種有為一星喻見二翳喻相三燈喻識四幻喻器五露喻身六泡喻受七夢喻過去八電喻現在九雲喻未來夫星雖夜燭遇朝光而不現見雖邪決逢正智而必盡此其同也翳眼之見毛輪雖似有而非實見心所鑒之境亦但相而是空此其同也燈光依油炷而住新新謝滅識性依我愛而立亦念念無常此其同也幻雖千變智者審其非實器雖萬像觀者了之為無此其同也露雖夜泫遇朝陽而必晞身雖暫停逢死魔而必壞此其同也風擊水而成泡觸會境而生受離風水而無泡離觸力而無受此其同也過去之境此證智之所知眠夢所遊亦念心之所録此其同也電光閃爍僅似有而即無現法亦爾才得體而便滅此其同也雲浮在空能作生雨之因種子在識能為感報之本以雲約雨雨在未來而是無以種約報報在當生而不現此其同也如來得此九觀故能行生死而不動不動是法印動則魔網也佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行兩聖對揚四部蒙益是故心喜而身躍信受以流通也夫物之顯也無不關時是故荊山之璞三獻而後粲然于世矣唐慧淨法師之注金剛般若波羅蜜經在支那而不行焉於扶桑亦未覩焉蓋不得時也近豫友義空師獲其真本太煞歡躍遂加和點刊行而永傳之無窮以為迷途之慧炬苦海之慈航數百年間久隱之至寶一旦發光揚彩不亦幸可謂是得時者也豫貴其志謹為跋云享保二歲次丁酉初秋日丹陽散人烏有子
