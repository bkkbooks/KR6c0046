body:
  text: 須菩提譬如有人身如須彌山王於意云何是身為大不前來並約法身斷疑此問次約應身斷疑疑曰法身是真如真如不可取者應身是真智真智不可取也如其是可取何取有纍於無相如其不可取何以自取為法王佛欲斷此疑故為斯問須彌山王喻應身也量高八萬可言大也勝出諸山可言王也須菩提言甚大世尊答意明應身以真智為體以自在為用體周法界可言大也用超衆聖可言王也須彌雖大以非心故不謂我是山王應身雖大以離相故不謂我是法王也何以故佛說非身是名大身更曉身之大義何者身有二種一有流身二無流身非身者非有流之身大身者是無流之身夫有流即遇物斯限無流即觸徒斯契有限者不能周能契者必能遍不能周故失大身之名必能遍故得大身之義也須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不前來宗明經體自下主明經用用難指事故格量以喻之初言三千不即言恆沙者自少之多開化漸也恆河者恆是河之神名河即因神立目問意言初以一恆之沙為數次有爾許沙數恆河後諸恆之中復各有諸沙數是諸沙數寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙諸河為總諸沙為別河尚無數況乃沙乎須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不一恆之沙為第一多一沙復為一恆河為第二多諸恆之中復各有諸沙數為第三多諸沙之中一沙復為一世界為第四多今問若人施寶同乎此量所生之福得為多不須菩提言甚多世尊答明多也佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說如此福德勝前福德捨寶雖多而生福少持經雖少而生福多者經之勝用在乎此也復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟下明此經之勝成彼生福之多此章明此經能令物尊隨何處說此經即令此處可尊隨何人說此經即令此人可貴隨何所捨此寶不令此處可尊隨何人捨此寶不令此人可貴由此義故持經雖少而福多捨寶雖多而福少也何況有人盡能受持讀誦何況者一以無情況有情謂以地況人二以少況多即一偈況於盡受也地本無靈說處尚令尊仰人既有識持者深須虔養也須菩提當知是人成就最上第一希有之法希有之法是菩提成就菩提即人可貴也若是經典所在之處則為有佛若尊重弟子有經之處則有佛教佛教不異經教也可重之者是弟子弟子即是菩薩也有佛顯有能說有菩薩顯有能受兩聖居中處可尊爾時須菩提白佛言世尊當何名此經我等云何奉持此章明此經體是真流夫證真如者得真般若從真般若流乎大定從大定流乎大悲從大悲流乎化身從化身流乎此經故此經真所流也經是真流故持雖少而福多寶非真流故施雖多而福少須菩提欲顯此義故設兩請初請約文以求目此文以何為名後請約義以問持此義云何修奉佛告須菩提是經名為金剛般若波羅蜜此答初問顯真流義也夫名以宣實實為名本證實者能流名尋名者能津實欲顯此經既為證真者之所流還詮證真者之般若故目之曰金剛般若也金剛以不壞為義喻智真也般若以神照為功即智體也波羅蜜以到岸為趣顯智用也以是名字汝當奉持此答後問即令依向所立之名以持此文之義所以爾者立名之意欲令依名以取文依文以尋義依義以修行依行以證真故須依此名字而奉持也所以者何須菩提佛說般若波羅蜜則非般若波羅蜜更曉前意夫證真之曰得真般若得真之時便捨文字故云佛說般若即非般若也若能依名作取捨兩意以持此文之義即是如法奉持也須菩提於意云何如來有所說法不此章明此經是諸佛同說夫能證真者能說真如說行者能證真諸佛已證為他證故同說菩薩未證為自證故同行欲顯同行者必同證先明同證者必同說故為斯問問意言頗有一法唯我釋迦獨說非餘諸佛所說耶若唯我獨說即我名有所說若餘佛亦說即我名無所說矣須菩提白佛言世尊如來無所說此說同彼佛則說無所說也若然者隨是一法則一切諸佛同說無有一實得一切諸人共捨法可同說同行者必同證所以持雖少而福多財無共捨別捨者不同證所以施雖多而福少也須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊此章明此經是滅惑之本夫通論財施之福內生不善之惑外感無記之塵弘經之善則近滅煩惱之因遠感菩提之報今欲明施福之所生即經福之所滅故為斯問夫積微塵以成世界則塵因而界果碎世界以作微塵則界因而塵果然則世界作微塵是微塵從世界出此喻示何義示煩惱從財施生微塵衆甚多是微塵遍滿虗空此喻示何義示煩惱彌綸法界須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界塵以染坌為義界以因性為理地塵非染塵是說地微塵世界非染因是說為世界此喻通顯兩意一取非為喻顯智慧非染塵經福非染因二取是為喻顯煩惱是染塵施福是染因然則前是破粗為細示因少而果多此即摧有入無顯始生而終滅何以明之夫地塵是相結屬分別性煩惱塵是粗重結屬依他性相結雖不可以無生觀斷然可以無相觀滅粗重結雖不可以無相觀滅然可以無生觀斷二塵雖異俱財用之所生兩觀乃殊並經力之能致若爾財福之所生即經福之所滅能滅即為勝所滅即為劣由此義故施寶雖多而福少弘經雖少而福多也須菩提於意云何可以三十二相見如來不此章明弘經之福是諸善中勝夫因以感果果以酬因果勝即因勝果劣即因劣欲寄應真兩果以辨勝劣二因故為斯問問意云如來以真如為體三十二相是虗妄之法可以此相見如來不不也世尊何以故如來說三十二相即是非相是名三十二相三十二相是丈夫之相無相是菩提之相即是非相非菩提之相是名三十二相是丈夫之相此明兩相異體即顯應真殊狀夫三十二相是世間之勝報其因尚劣於經福無相是出世之妙果其業理勝於施善由此義故施寶雖多而福少弘經雖少而福多也須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多前寄捨財以明勝此寄捨身以明勝依報易捨正報難捐自易之難亦化漸也爾時須菩提聞說是經深解義趣涕淚悲泣須菩提欲歎經勝以成福先陳己悟以興感然則凡夫悲感多為憂生聖人悲感多因喜起今者須菩提耳餐正說慧鑒真如一則愍彼捨身二則欣今所說而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經此歎希有昔來之所不聞約時以顯希有也慧眼之所不聞約行以顯希有也經是希有故弘雖少而福多身非希有故施雖多而福少也世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德此歎不共何者斯經有實信不與二乘共也信心清淨信教也則生實相信理也然實相可顯不可生言生實相者但生實相信耳世尊是實相者則是非相是故如來說名實相更曉前意則是非相則非二乘之實相說名實相說名大乘之實相非二乘之實相下人之所不成是大乘之實相上人之所獨得由經有不共之實相所以弘雖少而福多身無不共之實相所以施雖多而福少也世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有此歎生解深夫信為人道之初宗智為究竟之玄術將言生智之不易先美起信之為難須菩提言我今承力而得解易故非為希有末世自思而起信難故方為希有何以故欲明希有意故發問以徵之此人無我相人相衆生相壽者相此明依經起信悟人空以答之所以者何我相即是非相人相衆生相壽者相即是非相此明依經起信悟法空以釋之此明法空者何以不言法相即是非相耶夫無我有二種前明無人我之相今明無法我之相不相違也何以故離一切諸相則名諸佛相若是實則佛不能離今離相名佛故知相即非相佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有如是如是述其言也得聞不怖成其義也一往怛愕名驚心膽怯弱名怖深惡前事名畏驚是始行人怖是二乘人畏是外道人初人於真空理有信而無定亂故所以心驚次人有定而無信疑故所以生怖後人無信亦無定謗故所以生畏異初人故聞經不驚異次人故思義不怖異後人故修行不畏何以故須菩提如來說第一波羅蜜非第一波羅蜜是名第一波羅蜜此歎教中勝夫斯經以般若為主般若則六度之中為勝故云第一非餘人之所量故云非第一言非第一者顯不共義是名第一者顯最勝義般若為因言教為果般若勝故言教第一經是第一故弘雖少而福多身非第一故施雖多而福少也須菩提忍辱波羅蜜如來說非忍辱波羅蜜此中復有疑此疑從有住起疑曰捨身苦身而得福劣者依經起行亦生苦受得福云何勝耶為斷斯疑故明忍度何者此忍以無癡善根為體無生法忍為性唯諸佛之所窮故名波羅蜜非餘人之能究故說非波羅蜜依經起行既生無生之勝忍豈苦受之所倦哉何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相前明有苦而能忍此明有忍故無苦何者若有自我他我之異便見能害所害之殊我於爾時既無兩我之執則不見歌利為能害我身為所害既無兩害之體苦受從誰而生何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨更說無苦義節節支解害事極也不生瞋恨忍力猛也瞋恨因我執而生我執既無瞋恨從誰而作然瞋是大惑恨是小纏大惑即可報之以殺心小纏但得加之以楚毒也須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相前明有忍故無苦此明無苦故有樂何者作忍辱仙人顯有慈悲無我等相明無瞋恨無瞋恨故無苦有慈悲故有樂也是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心下更防其過也夫見苦而行苦者則心疲而退沒忘苦而行苦者則心輕而進升為防退沒之行所以教發無住之心也夫菩提以無住為體若能忘相發心心即泯同無住所以離相發心即無住心之體也不應住色生心不應住聲香味觸法生心應生無所住心此示無住境也不住色等生心令離果報也應生無所住心令離報因也若心有住則為非住此示無住障也若心有住住前二境則為非住不住菩提若有此心便成障也是故佛說菩薩心不應住色布施此示無住行也夫升高者必自邇涉深者必自淺是故欲入無住之心位者應修無住之行也無住心位初地以上無住行位道種以還故攝大乘論曰願樂位六波羅蜜雖是世間法能引出世心今言施者亦以三檀攝六也須菩提菩薩為利益一切衆生應如是布施前約有住斷疑今約無住斷疑疑曰若其無住為誰修行若見衆生可為應名住著衆生今明約俗可言有為故言為利益一切衆生應如是布施若三檀分別即令衆生捨三種苦得三種樂由資生檀故令捨貧窮苦得巨富樂由無畏檀故令捨怖畏苦得安隱樂由法檀故令捨生死苦得涅槃樂也如來說一切諸相即是非相又說一切衆生則非衆生此明約真可言無住何者諸相是衆生之體衆生之體即衆生之名諸相非相體空而非實衆生非生名空而是假名體空矣何所住哉須菩提如來是真語者實語者如語者不誑語者不異語者前約外化明無住此約自行明無住疑曰道若無住不應與果為因若住果者何得復名無住今明道雖不住而能為因此乃證真者之所通非理外者之能達但可依我語以取信憑聖教以修行耳欲顯此行可信未可證故舉五語以勸之五語者為顯四義真語說真智如語說真如實語說四諦之理不誑語說三世之事不異一語即總定前四不可回也須菩提如來所得法此法無實無虗前既舉言以勸信或畏守言而失道為防彼故今對治之此法即目如來言教之法此法是佛法辨之所通是佛辭辨之所說與佛相應故是如來所得法夫道處無言守言即失道所以此法無實然言能示道離言不見道所以此法無虗言能示道故指月之譬興道處無言故捨船之喻作須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色此章雙約有住無住斷疑疑曰若菩提即真如真如之體時無不通處無不遍若爾云何心無住時能得菩提心有住時即不能得云何聖人處可得凡夫處不得今斷此疑故為斯譬暗以譬惑明以譬道色以譬真若心有住是有惑而無道若心無住是有道而無惑夫真雖不隔於惑道其惑不滅不可以道證真猶色雖不隔於明暗其暗不滅不可以眼見色若爾見者自得不見者自不得得與不得由乎見與不見何關真如遍與不遍也哉須菩提當來之世若有善男子善女人能於此經受持讀誦從上初恆以來大意主明經用自此訖於後問義旨為顯修行能於此經修行處也受持讀誦修行事也則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德欲顯修福之轉勝先言得福之無邊須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施前捨多身而時短今捨多身而時長從短之長此轉勝之義也若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解脫不逆不謗也此中從淺至深有六種修行一書二受三持四讀五誦六說夫不謗是行前之淺信受說即行內之深修淺信福已過前深修固難為喻須菩提以要言之是經有不可思議不可稱量無邊功德此下歎修行之用以勵修者之心此章明境界深心口所不及不可思議也權衡不能准不可稱量也如來為發大乘者說為發最上乘者說此章明依止大運出二乘之表故曰大乘顯過兩障之外故稱最上由佛說有三一下說說四諦即小乘二上說說六度即大乘三最上說說三無性即一乘此經為發後二乘者說所以依止大也若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德此章明滿界種界種即是三種佛性也一自性住佛性二引出佛性三至德果佛性自性住佛性即真如界引出佛性即菩提心至德果佛性即六度行初一名界後兩名種所謂依真如之界發萌芽之種故合名界種若人依經起行即生無邊之福與此三性相應故能圓滿界種也如是人等則為荷擔如來阿耨多羅三藐三菩提此章明持正法正法即菩提也菩提名覺覺有四種一應覺謂真如覺之緣也二正覺謂真智覺之體也三覺分謂福德覺之因也四令覺謂正教覺之用也若人修行正說是攝持令覺依正說修正行是攝持覺分依正行生真智是攝持正覺依真智證真如是攝持應覺攝持即是荷擔也何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解脫此章明難信聞樂小是聲聞緣覺著我是外道凡夫樂小明無受大之機著我顯與無我正反並非法器豈妄授哉須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸香華而散其處此章明處成尊恭敬圍繞內心處也華香散處外則供也復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提此章明淨三障一惑障二業障三報障由經力故轉重為輕促長令短此淨義也為人輕賤轉報障也先世罪滅轉業障也當得菩提滅惑障也須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及此章明速證果阿僧祇此云不可數也外國算法有六十位過此以後佛可復知故名阿僧祇夫以事佛之福為一分持經之福為百分事佛福一分不及經福百中之一分次以百中之一分為千分亦不及千中之一分後去皆爾故云乃至算數譬喻所不能及也須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信此章明得大報先顯因多也具說則文浩蕩故耳識不能受義深邃故意識不能持耳不能受則耳識亂意不能持則意識狂由亂由狂則懷疑以生謗由疑由謗則墮獄而受殃由此義故佛不具說也須菩提當知是經義不可思議果報亦不可思議此明果大也近招十王果報遠感諸佛三身十王果報勢力遠而難思諸佛三身體用大而無測也爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心前來第一周為立菩薩行體自下第二周為斷菩薩行障何者前周之初教菩薩起三行涉行深者即忘懷而捨著發迹近者或存能以自取謂我能如是住我能如是修我能如是降伏我即真是菩薩夫有我即有住有住即有障無我即無住無住即無障住與不住相違我與無我正反有我之心既迷無我之妙理有住之執亦障無住之真行也夫行以趣果為功障以礙道為用障若不斷行無由成障斷行成則菩提之果日可登也為此義故須菩提重請前章以發端欲令如來絶彼證道之深纍佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故若菩薩有我相人相衆生相壽者相則非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者此答初請即斷彼行障也何則夫存自者不能忘觀存他者不能忘境其欲自他兩滅者莫若境觀雙盡也是故如來控前無度以盡境引今無發以盡觀境盡故絶乎所度觀盡故絶乎能度所度絶即他我滅也能度絶即自我滅也兩我之執既滅障道之纍自靜由此論之豈有一我為菩薩而為發心之物乎故曰所以者何實無有法發阿耨多羅三藐三菩提心者也須菩提既三行具請如來但舉一答何也夫發心為初修行為次降伏為後發心為顯攝道修行為顯成就道降伏為顯不退道既初無發心者而況修行乎況於降伏乎
